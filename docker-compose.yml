
services:
  frontend:
    build:
      context: .
      dockerfile: frontend.dockerfile
    image: secureops-frontend
      
    ports:
      - "80:80"
    depends_on:
      - backend
  
  backend:
    build:
      context: .
      dockerfile: backend.dockerfile
    image: secureops-backend

    ports: 
      - "5000:5000"